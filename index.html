<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market Watch</title>
  <style>
    body {
      font-family: -apple-system;
      background: #000;
      color: #0f0;
      text-align: center;
      padding-top: 25px;
    }
    .price {
      font-size: 24px;
      margin: 15px 0;
    }
  </style>
</head>

<body>
  <h3>📊 Market</h3>

  <div class="price" id="btc">BTC: --</div>
  <div class="price" id="gold">XAUT: --</div>

<script>
let lastData = {
  btc: "--",
  gold: "--"
};

async function loadData() {
  try {
    const res = await fetch("/api/price");
    const data = await res.json();

    lastData = data;

  } catch (e) {
    console.log("use cache");
  }

  document.getElementById("btc").innerText =
    "BTC: $" + lastData.btc;

  document.getElementById("gold").innerText =
    "XAUT: $" + lastData.gold;
}

loadData();
setInterval(loadData, 120000); // 2分钟刷新（更稳）
</script>

</body>
</html>
