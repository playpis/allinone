<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    .container {
      width: 90%;
      max-width: 320px;
    }

    .card {
      background: #111;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 0 10px rgba(0,255,0,0.1);
    }

    .name {
      font-size: 12px;
      color: #aaa;
    }

    .price {
      font-size: 26px;
      font-weight: bold;
      margin-top: 4px;
    }

    .change {
      font-size: 14px;
      margin-top: 4px;
    }

    .up {
      color: #00ff88;
    }

    .down {
      color: #ff4d4f;
    }

    .footer {
      font-size: 10px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="name">Bitcoin</div>
    <div class="price" id="btc-price">--</div>
    <div class="change" id="btc-change"></div>
  </div>

  <div class="card">
    <div class="name">Tether Gold</div>
    <div class="price" id="gold-price">--</div>
    <div class="change" id="gold-change"></div>
  </div>

  <div class="footer" id="time">Updating...</div>

</div>

<script>
let last = {
  btc: "--",
  btc_24h: 0,
  gold: "--",
  gold_24h: 0
};

async function loadData() {
  try {
    const res = await fetch("/api/price");
    const data = await res.json();
    last = data;
  } catch (e) {
    console.log("use cache");
  }

  updateUI("btc", last.btc, last.btc_24h);
  updateUI("gold", last.gold, last.gold_24h);

  document.getElementById("time").innerText =
    "Updated: " + new Date().toLocaleTimeString();
}

function updateUI(id, price, change) {
  document.getElementById(id + "-price").innerText =
    "$" + price;

  const el = document.getElementById(id + "-change");

  const isUp = change >= 0;
  el.innerText = (isUp ? "+" : "") + change + "%";
  el.className = "change " + (isUp ? "up" : "down");
}

loadData();
setInterval(loadData, 120000);
</script>

</body>
</html>
